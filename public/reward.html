<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Key</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0c10; color: #fff;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1c23; border-radius: 16px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      padding: 30px 35px; width: 90%; max-width: 450px;
      text-align: center; border: 1px solid #2a2d37;
    }
    .icon { font-size: 48px; margin-bottom: 10px; }
    h2 { font-size: 22px; margin-bottom: 5px; }
    .sub { color: #999; font-size: 14px; margin-bottom: 25px; }
    .key-box {
      background: #0f1117; border: 1px solid #333a47;
      border-radius: 12px; padding: 16px; font-size: 20px;
      font-family: 'Courier New', monospace; word-break: break-all;
      margin: 15px 0; color: #e0e0e0; user-select: all;
    }
    .copy-btn {
      background: #5865F2; border: none; color: white;
      padding: 12px 30px; border-radius: 8px; font-size: 16px;
      font-weight: bold; cursor: pointer; transition: 0.2s; outline: none;
    }
    .copy-btn:hover { background: #4752c4; }
    .copy-btn.copied { background: #43b581; }
    .footer { margin-top: 25px; font-size: 12px; color: #666; }
    .loading { margin: 30px 0; color: #aaa; }
    .error { color: #ff4d4d; margin: 20px 0; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <h2>Your 24‑Hour Key</h2>
    <p class="sub">Copy and paste into your script.</p>

    <div id="loading" class="loading">Fetching key...</div>
    <div id="error" class="error"></div>

    <div id="key-display" style="display: none;">
      <div class="key-box" id="key-text"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyKey()">Copy</button>
      <div class="footer">⚠️ This key works only for you and expires after 24 hours.</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function fetchKey() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const display = document.getElementById('key-display');

      if (!token) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.innerText = 'Missing token. Please generate a new key.';
        return;
      }

      try {
        const res = await fetch(`/get-key?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        document.getElementById('key-text').innerText = data.key;
        loading.style.display = 'none';
        display.style.display = 'block';
      } catch (e) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.innerText = e.message;
      }
    }

    function copyKey() {
      const key = document.getElementById('key-text').innerText;
      navigator.clipboard.writeText(key).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.innerText = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerText = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    window.onload = fetchKey;
  </script>
</body>
</html>
